# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path-list to be prepended to sys.path in env.py;
# prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to associate with the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow empty migrations to be generated; during
# autogenerate
# version_locations = %(here)s/bar:%(here)s/bat:version_locations

# version path separator; defaults to 'os.pathsep'.
# Use ';' for Windows compatibility or ':' for Unix.
version_path_separator = :

# set to 'true' to search for newer versions in version paths
# recursive_version_locations = false

# set to 'true' to enable output of SQL statements during executions
# show_operations = false

logging_config_style = ini

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
